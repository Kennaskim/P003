name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  # Dummy DATABASE_URL for Prisma Client generation (no actual DB connection needed)
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci_db?schema=public"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Install dependencies & generate Prisma
  # ──────────────────────────────────────────────
  install:
    name: 📦 Install & Generate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/api
        run: npx prisma generate

      # Cache node_modules + generated Prisma client for downstream jobs
      - name: Cache workspace
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

  # ──────────────────────────────────────────────
  # Job 2: Lint all workspaces
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Run Linter
        run: npm run lint

  # ──────────────────────────────────────────────
  # Job 3: Type checking
  # ──────────────────────────────────────────────
  typecheck:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Check types
        run: npm run check-types

  # ──────────────────────────────────────────────
  # Job 4: Build the Web app (Next.js)
  # ──────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build Web app
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_AUTH_TOKEN: ""
          # Skip Sentry source map upload in CI
          SENTRY_ORG: ""
          SENTRY_PROJECT: ""

  # ──────────────────────────────────────────────
  # Job 5: Build the API (NestJS)
  # ──────────────────────────────────────────────
  build-api:
    name: ⚙️ Build API
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build API
        run: npm run build --workspace=apps/api

  # ──────────────────────────────────────────────
  # Job 6: Run API tests
  # ──────────────────────────────────────────────
  test-api:
    name: 🧪 Test API
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            apps/api/node_modules/.prisma
          key: workspace-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Run API tests
        run: npm run test --workspace=apps/api
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret

  # ──────────────────────────────────────────────
  # Final gate: all checks must pass
  # ──────────────────────────────────────────────
  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, build-web, build-api, test-api]

    steps:
      - name: Check all jobs
        run: |
          echo "Lint:      ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Build Web: ${{ needs.build-web.result }}"
          echo "Build API: ${{ needs.build-api.result }}"
          echo "Test API:  ${{ needs.test-api.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build-web.result }}" != "success" ]] || \
             [[ "${{ needs.build-api.result }}" != "success" ]] || \
             [[ "${{ needs.test-api.result }}" != "success" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi

          echo "🎉 All CI checks passed!"
